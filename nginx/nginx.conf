events {}

http {

    upstream rails_app {
        server 127.0.0.1:3000;
    }

    server {

        listen 80;

        server_name _;

        # access_log /dev/stdout;   # stdout → captured by awslogs → CloudWatch
        # error_log  /dev/stderr warn;   # stderr → captured by awslogs → CloudWatch
        
        access_log /var/log/nginx/access.log;   # tailed by CloudWatch Agent
        error_log  /var/log/nginx/error.log warn; 

        location / {
            proxy_pass http://rails_app;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /up {
            proxy_pass http://rails_app/up;
        }
    }
}
