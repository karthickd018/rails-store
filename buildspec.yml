version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging into Amazon ECR...
      - aws ecr get-login-password --region ap-south-2 | docker login --username AWS --password-stdin 915079919337.dkr.ecr.ap-south-2.amazonaws.com

      - REPOSITORY_URI=915079919337.dkr.ecr.ap-south-2.amazonaws.com/store-app
      - IMAGE_TAG=latest

  build:
    commands:
      - echo Build started
      - docker build --platform linux/amd64 -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing image...
      - docker push $REPOSITORY_URI:$IMAGE_TAG

      - echo Creating imagedefinitions.json

      - printf '[{"name":"rails-app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json